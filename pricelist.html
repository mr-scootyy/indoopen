	<title>Pricelist</title>
	<style>
		:root{
			--bg:#0b1220;
			--card:#111a2e;
			--muted:#93a4c7;
			--text:#e9eefc;
			--line:rgba(255,255,255,.10);
			--accent:#6ea8ff;
			--chip:#182544;
		}
		*{box-sizing:border-box}
		body{
			margin:0;
			font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
			background:linear-gradient(180deg,#070b14, #0b1220 40%, #070b14);
			color:var(--text);
		}
		.container{
			max-width:980px;
			margin:0 auto;
			padding:18px 14px 28px;
		}
		.header{
			display:flex;
			gap:12px;
			align-items:flex-start;
			justify-content:space-between;
			flex-wrap:wrap;
			margin-bottom:12px;
		}
		.title{
			margin:0;
			font-size:20px;
			letter-spacing:.2px;
		}
		.sub{
			margin:6px 0 0;
			color:var(--muted);
			font-size:12.5px;
			line-height:1.4;
		}

		.toolbar{
			display:grid;
			grid-template-columns: 1fr 160px;
			gap:10px;
			width:100%;
			margin:12px 0 14px;
		}
		@media (max-width:520px){
			.toolbar{grid-template-columns:1fr}
		}
		.input, .select{
			width:100%;
			padding:12px 12px;
			border-radius:12px;
			border:1px solid var(--line);
			background:rgba(17,26,46,.7);
			color:var(--text);
			outline:none;
		}
		.input::placeholder{color:rgba(147,164,199,.75)}
		.badge{
			display:inline-flex;
			align-items:center;
			gap:8px;
			padding:8px 10px;
			border-radius:999px;
			background:rgba(24,37,68,.65);
			border:1px solid var(--line);
			color:var(--muted);
			font-size:12px;
			margin-top:10px;
			width:max-content;
		}
		.dot{
			width:8px;height:8px;border-radius:50%;
			background:var(--accent);
			box-shadow:0 0 0 4px rgba(110,168,255,.18);
		}

		.grid{
			display:grid;
			grid-template-columns: repeat(2, minmax(0,1fr));
			gap:10px;
		}
		@media (max-width:640px){
			.grid{grid-template-columns:1fr}
		}

		.card{
			background:rgba(17,26,46,.72);
			border:1px solid var(--line);
			border-radius:16px;
			padding:12px 12px;
			backdrop-filter: blur(6px);
		}
		.cardTop{
			display:flex;
			align-items:flex-start;
			justify-content:space-between;
			gap:10px;
			margin-bottom:8px;
		}
		.name{
			margin:0;
			font-size:14.5px;
			line-height:1.25;
		}
		.no{
			color:var(--muted);
			font-size:12px;
			white-space:nowrap;
		}
		.meta{
			display:flex;
			gap:8px;
			flex-wrap:wrap;
			margin:8px 0 0;
		}
		.chip{
			font-size:12px;
			color:var(--muted);
			background:rgba(24,37,68,.65);
			border:1px solid var(--line);
			padding:5px 8px;
			border-radius:999px;
		}
		.price{
			margin:10px 0 0;
			font-weight:700;
			font-size:15px;
			color:#ffffff;
		}
		.price small{
			display:inline-block;
			margin-left:8px;
			font-weight:600;
			color:var(--muted);
			font-size:12px;
		}
		hr{
			border:none;
			border-top:1px solid var(--line);
			margin:12px 0;
		}
		.footer{
			margin-top:14px;
			color:var(--muted);
			font-size:12px;
			line-height:1.5;
		}
	</style>
</head>

		// ====== Rendering + Filter ======
		const grid = document.getElementById("grid");
		const qEl = document.getElementById("q");
		const sizeEl = document.getElementById("size");
		const countInfo = document.getElementById("countInfo");

		function norm(s){ return (s ?? "").toString().trim().toLowerCase(); }

		function getSizeValue(){
			const v = sizeEl.value;
			if(v === "__EMPTY__") return "";
			return v;
		}

		function render(){
			const q = norm(qEl.value);
			const size = getSizeValue();

			const filtered = items.filter(it => {
				const matchQ =
					!q ||
					norm(it.produk).includes(q) ||
					norm(it.harga).includes(q) ||
					norm(it.ukuran).includes(q);

				const matchSize = !size || (it.ukuran ?? "") === size;
				return matchQ && matchSize;
			});

			countInfo.textContent = `Menampilkan ${filtered.length} dari ${items.length} item`;

			grid.innerHTML = filtered.map(it => {
				const ukuran = (it.ukuran ?? "").trim();
				const harga = (it.harga ?? "").trim();
				const isTBA = norm(harga) === "tba";

				return `
					<div class="card">
						<div class="cardTop">
							<h3 class="name">${escapeHtml(it.produk)}</h3>
							<div class="no">#${it.no}</div>
						</div>
						<div class="meta">
							<span class="chip">Ukuran: ${escapeHtml(ukuran || "-")}</span>
							<span class="chip">Status: ${isTBA ? "TBA" : "Ready"}</span>
						</div>
						<div class="price">
							${escapeHtml(harga || "-")}
							${isTBA ? `<small>(hubungi admin)</small>` : ``}
						</div>
					</div>
				`;
			}).join("");
		}

		function escapeHtml(str){
			return (str ?? "").toString()
				.replaceAll("&","&amp;")
				.replaceAll("<","&lt;")
				.replaceAll(">","&gt;")
				.replaceAll('"',"&quot;")
				.replaceAll("'","&#039;");
		}

		qEl.addEventListener("input", render);
		sizeEl.addEventListener("change", render);
		render();
	</script>
